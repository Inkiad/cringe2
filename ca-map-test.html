<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; }
    svg { display: block; }
    path { fill: #2a3f5a; stroke: rgba(255,255,255,0.2); stroke-width: 0.5; }
  </style>
</head>
<body>
  <svg id="map"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const w = window.innerWidth;
    const h = window.innerHeight;

    const svg = d3.select('#map')
      .attr('width', w)
      .attr('height', h)
      .attr('viewBox', `0 0 ${w} ${h}`);

    const info = svg.append('text')
      .attr('x', 20).attr('y', 30)
      .attr('fill', '#aaa').attr('font-size', '13px').attr('font-family', 'monospace')
      .text('loading...');

    d3.json('data/ca-congressional.geojson').then(geo => {
      // Bypass fitExtent entirely — compute projection manually from known CA bounds.
      // CA: lon -124.48 to -114.13 (span 0.1806 rad), Mercator lat span ~0.244 rad
      const lonSpan = 10.35 * Math.PI / 180;
      const latSpan = 0.244;
      const scale = Math.min((w - 40) / lonSpan, (h - 40) / latSpan);

      // Mercator center lat: the latitude whose mercator-y is midway between top and bottom
      // midY = (ln(tan(π/4 + 42.01°/2)) + ln(tan(π/4 + 32.53°/2))) / 2 ≈ 0.687
      // → latitude ≈ 36.22°
      const projection = d3.geoMercator()
        .scale(scale)
        .center([-119.305, 36.22])
        .translate([w / 2, h / 2]);

      const path = d3.geoPath().projection(projection);

      const la = projection([-118.2, 34.0]);
      const sf = projection([-122.4, 37.8]);

      info.text(`scale:${scale.toFixed(0)} | LA:${la[0].toFixed(0)},${la[1].toFixed(0)} | SF:${sf[0].toFixed(0)},${sf[1].toFixed(0)} | expected LA~1380,900`);

      svg.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', 'district')
        .attr('d', path);
    }).catch(e => {
      info.attr('fill', 'red').text('error: ' + e.message);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; }
    svg { display: block; }
    path { fill: #2a3f5a; stroke: rgba(255,255,255,0.2); stroke-width: 0.5; }
  </style>
</head>
<body>
  <svg id="map"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const w = window.innerWidth;
    const h = window.innerHeight;

    const svg = d3.select('#map')
      .attr('width', w)
      .attr('height', h)
      .attr('viewBox', `0 0 ${w} ${h}`);

    const info = svg.append('text')
      .attr('x', 20).attr('y', 30)
      .attr('fill', '#aaa').attr('font-size', '13px').attr('font-family', 'monospace')
      .text('loading...');

    d3.json('data/ca-congressional.geojson').then(geo => {
      const projection = d3.geoMercator()
        .fitExtent([[10, 10], [w - 10, h - 10]], geo);

      const path = d3.geoPath().projection(projection);

      const geoBounds = d3.geoBounds(geo);
      const la = projection([-118.2, 34.0]);

      info.text(`geoBounds: [[${geoBounds[0].map(v=>v.toFixed(2))}],[${geoBounds[1].map(v=>v.toFixed(2))}]] | features: ${geo.features.length} | LA: ${la[0].toFixed(0)},${la[1].toFixed(0)}`);

      svg.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', 'district')
        .attr('d', path);
    }).catch(e => {
      info.attr('fill', 'red').text('error: ' + e.message);
    });
  </script>
</body>
</html>

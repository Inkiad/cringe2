<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    svg { display: block; }
    path.district { stroke: rgba(255,255,255,0.15); stroke-width: 0.5; vector-effect: non-scaling-stroke; cursor: pointer; }
    path.district.D  { fill: #1a3d5c; }
    path.district.R  { fill: #5c1a1a; }
    path.district.vacant { fill: #2a2a2a; }
    path.district.D:hover, path.district.D.highlighted  { fill: #2a6090; }
    path.district.R:hover, path.district.R.highlighted  { fill: #902a2a; }
    path.district.vacant:hover, path.district.vacant.highlighted { fill: #444; }

    #search-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    #search-bar input {
      background: #111;
      color: #e8e8e8;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 0.85rem;
      width: 240px;
      font-family: Arial, sans-serif;
      outline: none;
    }
    #search-bar input:focus { border-color: #888; }
    #search-bar button {
      background: #2a2a2a;
      color: #e8e8e8;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 7px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    #search-bar button:hover { border-color: #888; }

    #reset-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2a2a2a;
      color: #888;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: Arial, sans-serif;
      display: none;
      z-index: 10;
    }
    #reset-btn:hover { color: #e8e8e8; border-color: #666; }

    #search-status {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 0.78rem;
      font-family: Arial, sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <svg id="map"></svg>

  <div id="search-bar">
    <input type="text" id="search-input" placeholder="city, address, or zip…" />
    <button id="search-btn">find district</button>
  </div>
  <div id="search-status"></div>
  <button id="reset-btn">reset zoom</button>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const w = window.innerWidth;
    const h = window.innerHeight;

    const svg = d3.select('#map')
      .attr('width', w)
      .attr('height', h)
      .attr('viewBox', `0 0 ${w} ${h}`);

    const g = svg.append('g');

    // Tooltip
    const tooltip = document.createElement('div');
    Object.assign(tooltip.style, {
      position: 'fixed', background: '#111', color: '#e8e8e8',
      padding: '6px 12px', borderRadius: '3px', fontSize: '13px',
      pointerEvents: 'none', display: 'none', border: '1px solid #333',
      zIndex: 20
    });
    document.body.appendChild(tooltip);

    // Zoom
    const zoom = d3.zoom()
      .scaleExtent([1, 20])
      .on('zoom', event => {
        g.attr('transform', event.transform);
        document.getElementById('reset-btn').style.display =
          event.transform.k > 1.01 ? 'block' : 'none';
      });

    svg.call(zoom);

    document.getElementById('reset-btn').addEventListener('click', () => {
      svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
    });

    function zoomToFeature(feature, pathGen) {
      const [[x0, y0], [x1, y1]] = pathGen.bounds(feature);
      const scale = Math.min(20, 0.85 / Math.max((x1 - x0) / w, (y1 - y0) / h));
      const tx = w / 2 - scale * (x0 + x1) / 2;
      const ty = h / 2 - scale * (y0 + y1) / 2;
      svg.transition().duration(700).call(
        zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale)
      );
    }

    Promise.all([
      d3.json('data/ca-congressional.geojson'),
      d3.json('data/ca-reps.json')
    ]).then(([geo, reps]) => {
      const projection = d3.geoMercator()
        .fitExtent([[40, 40], [w - 40, h - 40]], geo);

      const path = d3.geoPath().projection(projection);

      let highlighted = null;

      const districts = g.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', d => {
          const rep = reps.house[String(d.properties.district)];
          const party = rep?.party;
          return `district ${party === 'D' ? 'D' : party === 'R' ? 'R' : 'vacant'}`;
        })
        .attr('d', path)
        .on('mousemove', function(event, d) {
          const num = String(d.properties.district);
          const rep = reps.house[num];
          const party = rep?.party ? ` (${rep.party})` : '';
          tooltip.style.display = 'block';
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 32) + 'px';
          tooltip.textContent = rep ? `District ${num} — ${rep.name}${party}` : `District ${num}`;
        })
        .on('mouseleave', function() {
          tooltip.style.display = 'none';
        })
        .on('click', function(event, d) {
          event.stopPropagation();
          districts.classed('highlighted', false);
          if (highlighted === d) {
            highlighted = null;
            svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
          } else {
            highlighted = d;
            d3.select(this).classed('highlighted', true);
            zoomToFeature(d, path);
          }
        });

      // Click background to reset
      svg.on('click', () => {
        highlighted = null;
        districts.classed('highlighted', false);
        svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
      });

      // Search
      const status = document.getElementById('search-status');

      async function searchDistrict() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;
        status.textContent = 'searching…';

        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', California')}&format=json&limit=1&countrycodes=us`;
        let results;
        try {
          const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
          results = await res.json();
        } catch (e) {
          status.textContent = 'search failed';
          return;
        }

        if (!results.length) {
          status.textContent = 'location not found';
          return;
        }

        const lon = parseFloat(results[0].lon);
        const lat = parseFloat(results[0].lat);
        const match = geo.features.find(f => d3.geoContains(f, [lon, lat]));

        if (!match) {
          status.textContent = 'no CA congressional district found for that location';
          return;
        }

        const num = String(match.properties.district);
        const rep = reps.house[num];
        status.textContent = rep ? `District ${num} — ${rep.name}` : `District ${num}`;

        districts.classed('highlighted', false);
        highlighted = match;
        districts.filter(d => d === match).classed('highlighted', true);
        zoomToFeature(match, path);
      }

      document.getElementById('search-btn').addEventListener('click', searchDistrict);
      document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchDistrict();
      });

    }).catch(e => console.error(e));
  </script>
</body>
</html>

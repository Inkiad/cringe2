<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; }
    svg { display: block; }
    path { fill: #2a3f5a; stroke: rgba(255,255,255,0.2); stroke-width: 0.5; }
  </style>
</head>
<body>
  <svg id="map"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const w = window.innerWidth;
    const h = window.innerHeight;

    const svg = d3.select('#map')
      .attr('width', w)
      .attr('height', h)
      .attr('viewBox', `0 0 ${w} ${h}`);

    const tooltip = document.createElement('div');
    Object.assign(tooltip.style, {
      position: 'fixed', background: '#111', color: '#e8e8e8',
      padding: '6px 12px', borderRadius: '3px', fontSize: '13px',
      pointerEvents: 'none', display: 'none', border: '1px solid #333'
    });
    document.body.appendChild(tooltip);

    Promise.all([
      d3.json('data/ca-congressional.geojson'),
      d3.json('data/ca-reps.json')
    ]).then(([geo, reps]) => {
      const projection = d3.geoMercator()
        .fitExtent([[40, 40], [w - 40, h - 40]], geo);

      const path = d3.geoPath().projection(projection);

      svg.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', 'district')
        .attr('d', path)
        .on('mousemove', function(event, d) {
          const num = String(d.properties.district);
          const rep = reps.house[num];
          const label = rep ? `District ${num} — ${rep.name} (${rep.party || 'Vacant'})` : `District ${num}`;
          tooltip.style.display = 'block';
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 32) + 'px';
          tooltip.textContent = label;
          d3.select(this).attr('fill', 'rgba(255,255,255,0.15)');
        })
        .on('mouseleave', function() {
          tooltip.style.display = 'none';
          d3.select(this).attr('fill', '#2a3f5a');
        });
    }).catch(e => console.error(e));
  </script>
</body>
</html>

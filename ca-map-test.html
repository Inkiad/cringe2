<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; }
    svg { display: block; }
    path { fill: #2a3f5a; stroke: rgba(255,255,255,0.2); stroke-width: 0.5; }
  </style>
</head>
<body>
  <svg id="map"></svg>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    const w = window.innerWidth;
    const h = window.innerHeight;

    const svg = d3.select('#map')
      .attr('width', w)
      .attr('height', h)
      .attr('viewBox', `0 0 ${w} ${h}`);

    const info = svg.append('text')
      .attr('x', 20).attr('y', 30)
      .attr('fill', '#aaa').attr('font-size', '13px').attr('font-family', 'monospace')
      .text('loading...');

    d3.json('data/ca-congressional.geojson').then(geo => {
      const caBBox = {
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: [[
            [-124.48, 32.53], [-114.13, 32.53],
            [-114.13, 42.01], [-124.48, 42.01],
            [-124.48, 32.53]
          ]]
        }
      };

      const projection = d3.geoMercator()
        .fitExtent([[40, 40], [w - 40, h - 40]], caBBox);

      const path = d3.geoPath().projection(projection);

      info.text(`geoBounds: ${JSON.stringify(d3.geoBounds(geo))}`);

      svg.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', 'district')
        .attr('d', path);
    }).catch(e => {
      info.attr('fill', 'red').text('error: ' + e.message);
    });
  </script>
</body>
</html>

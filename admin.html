<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin - rsvp responses</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="images/cat4.png">
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="tab-title">hi</a>
        <a href="menu.html" class="tab-title">menu</a>
        <a href="general.html" class="tab-title">general information</a>
        <a href="rsvp.html" class="tab-title">rsvp</a>
        <a href="projects.html" class="tab-title">projects</a>
    </div>
    <img class="background" src="images/cat4.png" alt="Background">
    
    <div class="content">
        <div class="admin-container">
            <div class="admin-header">
                <h1>rsvp responses</h1>
                <div>
                    <button onclick="loadResponses()" class="refresh-btn">🔄 refresh</button>
                    <button onclick="exportCSV()" class="export-btn">📥 export csv</button>
                </div>
            </div>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-label">total responses</div>
                    <div class="stat-value" id="total-count">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">prefer dinner party</div>
                    <div class="stat-value" id="dinner-count">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">prefer house party</div>
                    <div class="stat-value" id="house-count">-</div>
                </div>
            </div>

            <div id="responses-container">
                <div class="loading">loading responses...</div>
            </div>
        </div>
    </div>

    <script>
        // Add this at the very top of your script section
        const ADMIN_PASSWORD = "lily"; // Change this!
        
        function checkAuth() {
            const savedPassword = sessionStorage.getItem('adminAuth');
            
            if (savedPassword !== ADMIN_PASSWORD) {
                const password = prompt('Enter admin password:');
                if (password !== ADMIN_PASSWORD) {
                    alert('Incorrect password!');
                    window.location.href = '/';
                    return false;
                }
                sessionStorage.setItem('adminAuth', password);
            }
            return true;
        }
        
        // Call this before loading anything
        if (!checkAuth()) {
            document.body.innerHTML = '<div style="text-align:center;padding:50px;">Access Denied</div>';
        }

        let allResponses = [];

        async function loadResponses() {
            const container = document.getElementById('responses-container');
            container.innerHTML = '<div class="loading">loading responses...</div>';

            try {
                // Fetch from Cloudflare Pages Function
                const response = await fetch('/api/get-rsvp');
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load');
                }
                
                const responses = result.rsvps || [];

                if (responses.length === 0) {
                    container.innerHTML = '<div class="no-responses">no responses yet! share the rsvp link with your friends 🐱</div>';
                    updateStats([]);
                    return;
                }
                
                allResponses = responses;
                displayResponses(responses);
                updateStats(responses);

            } catch (error) {
                console.error('Error loading responses:', error);
                container.innerHTML = '<div class="no-responses">error loading responses. please refresh the page.</div>';
            }
        }

        function displayResponses(responses) {
            const container = document.getElementById('responses-container');
            
            if (responses.length === 0) {
                container.innerHTML = '<div class="no-responses">no responses yet! share the rsvp link with your friends 🐱</div>';
                return;
            }

            container.innerHTML = responses.map(r => {
                const date = new Date(r.timestamp);
                const dateStr = date.toLocaleString();
                
                const formatBadgeClass = `badge-${r.format}`;
                
                const dateLabels = {
                    'dec31': 'December 31',
                    'jan2': 'January 2',
                    'jan3': 'January 3',
                    'none': 'Cannot attend'
                };
                
                const formatLabels = {
                    'dinner': 'Intimate Dinner Party',
                    'house': 'Larger House Party'
                };

                // Handle both old single date format and new multiple dates format
                let datesDisplay = '';
                if (Array.isArray(r.dates)) {
                    // New format: array of dates
                    datesDisplay = r.dates.map(d => {
                        const badgeClass = `badge-${d}`;
                        return `<span class="choice-badge ${badgeClass}">${dateLabels[d]}</span>`;
                    }).join(' ');
                } else if (r.date) {
                    // Old format: single date (for backwards compatibility)
                    const badgeClass = `badge-${r.date}`;
                    datesDisplay = `<span class="choice-badge ${badgeClass}">${dateLabels[r.date]}</span>`;
                }

                return `
                    <div class="response-card">
                        <div class="response-header">
                            <div class="response-name">${escapeHtml(r.name)}</div>
                            <div class="response-time">${dateStr}</div>
                        </div>
                        <div class="response-details">
                            <div>
                                <div class="detail-item">
                                    <span class="detail-label">preferred date${Array.isArray(r.dates) && r.dates.length > 1 ? 's' : ''}:</span>
                                    <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px;">
                                        ${datesDisplay}
                                    </div>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">party format:</span>
                                    <span class="choice-badge ${formatBadgeClass}">${formatLabels[r.format]}</span>
                                </div>
                            </div>
                            ${r.dietary ? `
                            <div class="detail-item">
                                <span class="detail-label">dietary restrictions:</span>
                                <span class="detail-value">${escapeHtml(r.dietary)}</span>
                            </div>
                            ` : ''}
                            ${r.comments ? `
                            <div class="detail-item">
                                <span class="detail-label">comments:</span>
                                <span class="detail-value">${escapeHtml(r.comments)}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(responses) {
            document.getElementById('total-count').textContent = responses.length;
            
            const dinnerCount = responses.filter(r => r.format === 'dinner').length;
            const houseCount = responses.filter(r => r.format === 'house').length;
            
            document.getElementById('dinner-count').textContent = dinnerCount;
            document.getElementById('house-count').textContent = houseCount;
        }

        function exportCSV() {
            if (allResponses.length === 0) {
                alert('No responses to export yet!');
                return;
            }

            const headers = ['Name', 'Date Preferences', 'Party Format', 'Dietary Restrictions', 'Comments', 'Timestamp'];
            const rows = allResponses.map(r => {
                // Handle both array and single date formats
                let dateValue = '';
                if (Array.isArray(r.dates)) {
                    dateValue = r.dates.join('; ');
                } else if (r.date) {
                    dateValue = r.date;
                }
                
                return [
                    r.name,
                    dateValue,
                    r.format,
                    r.dietary || '',
                    r.comments || '',
                    r.timestamp
                ];
            });

            const csv = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rsvp-responses-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load responses on page load
        window.addEventListener('load', loadResponses);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>california representatives - inky</title>
  <link rel="icon" type="image/x-icon" href="images/cat4.png">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Nav --- */
    .nav {
      background: #111;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 10;
      flex-wrap: wrap;
      gap: 8px;
    }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .nav a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    .nav a:hover { color: #e8e8e8; }
    .nav-title { color: #e8e8e8; font-size: 1rem; font-weight: 600; }

    .senators-bar { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #888; }
    .senators-bar .senator { display: flex; align-items: center; gap: 6px; }
    .senator-name { color: #e8e8e8; font-weight: 600; }
    .senator-link { color: #666; text-decoration: none; font-size: 0.78rem; }
    .senator-link:hover { color: #aaa; }
    .sep { color: #333; }

    /* --- Controls --- */
    .controls {
      background: #1e1e1e;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #2a2a2a;
      flex-wrap: wrap;
    }
    .controls-label { color: #555; font-size: 0.8rem; margin-right: 4px; }
    .toggle-btn {
      background: #2a2a2a; color: #888; border: 1px solid #333;
      padding: 5px 12px; border-radius: 4px; cursor: pointer;
      font-size: 0.82rem; font-family: Arial, sans-serif; transition: all 0.15s;
    }
    .toggle-btn:hover { color: #e8e8e8; border-color: #555; }
    .toggle-btn.active { background: #333; color: #e8e8e8; border-color: #666; }

    .controls-sep { color: #333; margin: 0 4px; }

    .search-form { display: flex; gap: 6px; margin-left: auto; }
    .search-form input {
      background: #2a2a2a; color: #e8e8e8; border: 1px solid #333;
      border-radius: 4px; padding: 5px 10px; font-size: 0.82rem;
      font-family: Arial, sans-serif; width: 200px; outline: none;
    }
    .search-form input:focus { border-color: #666; }
    .search-form button {
      background: #2a2a2a; color: #888; border: 1px solid #333;
      border-radius: 4px; padding: 5px 10px; font-size: 0.82rem;
      cursor: pointer; font-family: Arial, sans-serif;
    }
    .search-form button:hover { color: #e8e8e8; border-color: #555; }

    /* --- Main --- */
    .main { display: flex; flex: 1; overflow: hidden; }

    .map-wrapper { flex: 1; position: relative; overflow: hidden; }
    #map { display: block; }

    .map-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #1a1a1a; color: #555; font-size: 0.9rem;
      pointer-events: none;
    }

    #search-status {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #888; font-size: 0.78rem; pointer-events: none;
      background: #111; padding: 4px 10px; border-radius: 3px;
      border: 1px solid #2a2a2a; display: none;
    }

    #reset-btn {
      position: absolute; bottom: 12px; right: 12px;
      background: #2a2a2a; color: #666; border: 1px solid #333;
      border-radius: 4px; padding: 5px 12px; font-size: 0.78rem;
      cursor: pointer; font-family: Arial, sans-serif; display: none;
    }
    #reset-btn:hover { color: #e8e8e8; border-color: #666; }

    /* --- District paths --- */
    path.district { stroke: rgba(255,255,255,0.12); stroke-width: 0.5; vector-effect: non-scaling-stroke; cursor: pointer; }
    path.district.D       { fill: #1a3d5c; }
    path.district.R       { fill: #5c1a1a; }
    path.district.vacant  { fill: #252525; }
    path.district.D:hover, path.district.D.highlighted      { fill: #2a6090; }
    path.district.R:hover, path.district.R.highlighted      { fill: #902a2a; }
    path.district.vacant:hover, path.district.vacant.highlighted { fill: #3a3a3a; }

    /* --- Tooltip --- */
    .tooltip {
      position: fixed; background: #111; color: #e8e8e8;
      padding: 5px 10px; border-radius: 3px; font-size: 0.82rem;
      pointer-events: none; display: none; border: 1px solid #2a2a2a; z-index: 100;
    }

    /* --- Resize handle --- */
    .resize-handle {
      width: 4px;
      flex-shrink: 0;
      background: #2a2a2a;
      cursor: col-resize;
      transition: background 0.15s;
    }
    .resize-handle:hover, .resize-handle.dragging { background: #555; }

    /* --- Info panel --- */
    .info-panel {
      width: 240px; flex-shrink: 0; background: #111;
      padding: 20px 16px; overflow-y: auto;
    }
    .info-placeholder { color: #444; font-size: 0.85rem; margin-top: 8px; }
    .info-district { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .info-name { font-size: 1.1rem; font-weight: 700; color: #e8e8e8; margin-bottom: 4px; line-height: 1.3; }
    .info-party { font-size: 0.85rem; margin-bottom: 4px; font-weight: 600; }
    .info-party.D { color: #4a90d9; }
    .info-party.R { color: #d9504a; }
    .info-role { font-size: 0.8rem; color: #888; margin-bottom: 16px; }
    .info-link {
      display: inline-block; color: #aaa; text-decoration: none;
      font-size: 0.8rem; padding: 5px 10px; border: 1px solid #333;
      border-radius: 3px; margin-top: 4px;
    }
    .info-link:hover { color: #e8e8e8; border-color: #666; }
    .info-note { color: #555; font-size: 0.75rem; margin-top: 12px; line-height: 1.5; }
    .info-vacant { color: #666; font-size: 0.9rem; font-style: italic; }

    /* --- Votes table --- */
    .donors-section {
      margin-top: 20px;
      border-top: 1px solid #2a2a2a;
      padding-top: 16px;
    }
    .donors-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }
    .donors-cycle { font-weight: 400; letter-spacing: 0; text-transform: none; color: #444; }
    .donor-row { margin-bottom: 7px; }
    .donor-name {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .donor-bar-wrap { display: flex; align-items: center; gap: 7px; }
    .donor-bar {
      height: 5px;
      background: #3a5a7a;
      border-radius: 2px;
      flex-shrink: 0;
      min-width: 3px;
    }
    .donor-amt { font-size: 0.72rem; color: #555; flex-shrink: 0; }

    .votes-section {
      margin-top: 20px;
      border-top: 1px solid #2a2a2a;
      padding-top: 16px;
    }
    .votes-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 14px;
    }
    .vote-category { margin-bottom: 14px; }
    .vote-cat-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      border-bottom: 1px solid #2c2c2c;
      padding-bottom: 3px;
      margin-bottom: 5px;
    }
    .vote-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .vote-bill { color: #888; font-size: 0.78rem; flex: 1; line-height: 1.3; }
    .vote-cast {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      flex-shrink: 0; padding: 1px 5px; border-radius: 2px;
    }
    .vote-yea   { color: #4a9e6a; background: rgba(74,158,106,0.12); }
    .vote-nay   { color: #c05a5a; background: rgba(192,90,90,0.12); }
    .vote-other { color: #555; }
    .vote-no-record { color: #555; font-size: 0.78rem; font-style: italic; margin-top: 4px; }
    .vote-context { display: block; color: #555; font-size: 0.72rem; line-height: 1.4; margin-top: 2px; font-style: italic; }
    .info-since { font-size: 0.78rem; color: #555; margin-bottom: 12px; }

    /* --- Mobile handle (hidden on desktop) --- */
    .mobile-handle {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px 0 8px;
      flex-shrink: 0;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .mobile-handle-pill {
      width: 48px; height: 5px;
      background: #555; border-radius: 3px;
      pointer-events: none;
    }

    /* --- Responsive --- */
    @media (max-width: 700px) {
      .main { position: relative; flex-direction: row; }
      .map-wrapper { position: absolute; inset: 0; }
      .resize-handle { display: none; }

      .info-panel {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        height: 120px;
        border-left: none;
        border-top: 1px solid #2a2a2a;
        padding: 0 16px 16px;
        display: flex;
        flex-direction: column;
        transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 20;
      }
      .info-panel.dragging { transition: none; }

      .mobile-handle { display: flex; }

      .info-content {
        flex: 1;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding-top: 2px;
        /* push last item above Safari's URL bar (~50px) + home indicator */
        padding-bottom: max(70px, env(safe-area-inset-bottom));
        /* hide scrollbar — still scrollable, won't overlap content */
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .info-content::-webkit-scrollbar { display: none; }

      /* Tooltip is useless on mobile, keep it hidden */
      .tooltip { display: none !important; }

      .senators-bar { display: none; }
      .search-form { margin-left: 0; width: 100%; }
      .search-form input { flex: 1; width: auto; }

      .interesting-grid { grid-template-columns: 1fr; }
    }

    /* --- Interesting panel --- */
    #interesting-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 40px;
    }

    .interesting-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .interesting-col-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .interesting-sub-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin: 14px 0 8px;
    }

    .interesting-sub-label.rebels { color: #c07a3a; }
    .interesting-sub-label.strict { color: #3a6ea8; margin-top: 22px; }

    .interesting-empty {
      color: #444;
      font-size: 0.78rem;
      font-style: italic;
    }

    .rebel-card {
      background: #1b1b1b;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 9px 11px;
      margin-bottom: 7px;
    }

    .rebel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .rebel-name { font-weight: 600; color: #e8e8e8; font-size: 0.88rem; }
    .rebel-meta { color: #555; font-size: 0.72rem; white-space: nowrap; margin-left: 8px; }

    .rebel-cross {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 1px 0;
    }

    .rebel-bill { color: #777; font-size: 0.75rem; line-height: 1.3; }

    .strict-list { display: flex; flex-direction: column; gap: 3px; }

    .strict-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 0.8rem;
      padding: 2px 0;
    }

    .strict-dist { color: #444; font-size: 0.72rem; min-width: 24px; text-align: right; flex-shrink: 0; }
    .strict-name { color: #aaa; flex: 1; }
    .strict-party { font-weight: 700; font-size: 0.72rem; flex-shrink: 0; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-left">
      <a href="projects.html">← projects</a>
      <span class="nav-title">california representatives</span>
    </div>
    <div class="senators-bar" id="senators-bar"></div>
  </nav>

  <div class="controls">
    <span class="controls-label">show:</span>
    <button class="toggle-btn active" data-layer="house">US House</button>
    <button class="toggle-btn" data-layer="state_senate">State Senate</button>
    <button class="toggle-btn" data-layer="assembly">Assembly</button>
    <span class="controls-sep">·</span>
    <button class="toggle-btn" id="interesting-btn" data-layer="interesting">interesting</button>
    <span class="controls-sep">·</span>
    <form class="search-form" id="search-form">
      <input type="text" id="search-input" placeholder="city, address, or zip…" autocomplete="off" />
      <button type="submit">find district</button>
    </form>
  </div>

  <div class="main">
    <div class="map-wrapper" id="map-wrapper">
      <svg id="map"></svg>
      <div class="map-overlay" id="map-overlay">loading…</div>
      <div id="search-status"></div>
      <button id="reset-btn">reset zoom</button>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="info-panel" id="info-panel">
      <div class="mobile-handle" id="mobile-handle">
        <div class="mobile-handle-pill"></div>
      </div>
      <div class="info-content" id="info-content">
        <div class="info-placeholder">hover over a district</div>
      </div>
    </div>
  </div>

  <div id="interesting-panel"></div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const LAYERS = {
      house:        { file: 'data/ca-congressional.geojson', key: 'house',        label: 'US House' },
      state_senate: { file: 'data/ca-state-senate.geojson',  key: 'state_senate', label: 'CA State Senate' },
      assembly:     { file: 'data/ca-assembly.geojson',       key: 'assembly',     label: 'CA Assembly' },
    };

    const tooltip    = document.getElementById('tooltip');
    const infoPanel  = document.getElementById('info-panel');
    const infoContent = document.getElementById('info-content');
    const overlay    = document.getElementById('map-overlay');
    const resetBtn   = document.getElementById('reset-btn');
    const statusEl   = document.getElementById('search-status');

    let repsData       = null;
    let votesData      = null;
    let stateVotesData = null;
    let pacDonorsData  = null;

    // Fundraising platforms — not meaningful as "top donors"
    const PAC_SKIP = new Set(['ACTBLUE', 'WINRED', 'ACTBLUE VENDOR SERVICES', 'WINRED PAC']);
    let geoCache       = {};
    let activeLayer  = 'house';
    let gPath        = null;
    let svgSel       = null;
    let gSel         = null;
    let zoomBehavior = null;
    let highlighted  = null;
    let districts    = null;
    let locked       = null; // { num, rep, layerKey }

    function partyClass(rep) {
      if (!rep || rep.name === 'Vacant' || !rep.party) return 'vacant';
      return rep.party === 'D' ? 'D' : rep.party === 'R' ? 'R' : 'vacant';
    }

    const BILL_INFO = {
      'HR 26 — Born-Alive Abortion Survivors Protection Act': {
        label: 'Born-Alive Act',
        context: 'Requires medical care for infants born alive after an attempted abortion. Yea = support requirement, Nay = oppose.',
      },
      'HR 7 — No Taxpayer Funding for Abortion Act': {
        label: 'No Taxpayer Funding for Abortion',
        context: 'Permanently bans federal funding for abortion services. Yea = support ban, Nay = oppose ban.',
      },
      'HR 485 — Access to Family Building Act (IVF protection)': {
        label: 'IVF Protection Act',
        context: 'Prohibits states from restricting access to IVF and fertility treatments. Yea = protect IVF access, Nay = oppose.',
      },
      'HR 5378 — Lower Costs, More Transparency Act': {
        label: 'Healthcare Transparency Act',
        context: 'Requires hospitals and insurers to publicly disclose pricing; targets pharmacy benefit managers. Yea = support transparency.',
      },
      'HR 3746 — Fiscal Responsibility Act (Debt Ceiling)': {
        label: 'Debt Ceiling / Fiscal Responsibility Act',
        context: 'Raised the debt ceiling in exchange for spending caps and work requirements for some benefits. Bipartisan vote.',
      },
      'HR 4366 — FY2024 Appropriations (House Republican spending bill)': {
        label: 'FY2024 Appropriations',
        context: 'Republican-led government funding bill with significant cuts to domestic programs. Yea = support cuts, Nay = oppose cuts.',
      },
      'HR 2 — Secure the Border Act': {
        label: 'Secure the Border Act',
        context: 'Sweeping Republican border bill: resume wall construction, expand deportations, restrict asylum. Yea = support, Nay = oppose.',
      },
      'S.5 — Laken Riley Act': {
        label: 'Laken Riley Act',
        context: 'Requires detention of undocumented immigrants charged with theft or violent crimes. Yea = support, Nay = oppose.',
      },
      'HR 6644 — Housing for the 21st Century Act': {
        label: 'Housing for the 21st Century Act',
        context: 'Broad bipartisan housing supply bill: zoning reform (allows multifamily in retail/office zones, duplexes in single-family areas), streamlined permitting, expanded housing tax credits. Yea = support, Nay = oppose.',
      },
      'HR 4758 — Homeowner Energy Freedom Act': {
        label: 'Homeowner Energy Freedom Act',
        context: 'Repeals IRA home energy efficiency rebate programs and federal assistance for state building energy codes. Energy-related but affects housing construction costs. Yea = repeal programs, Nay = keep programs.',
      },
    };

    const VOTE_CATEGORIES = ['abortion', 'healthcare', 'spending', 'immigration', 'housing'];

    // ── State legislature bill info ────────────────────────────────────────────
    const STATE_BILL_INFO = {
      // Housing
      'SB 79 — Transit-Oriented Housing Development (2025)': {
        label: 'SB 79 — Transit-Oriented Housing (2025)',
        context: 'Requires cities to allow multi-family housing near transit stations regardless of local zoning. Yea = support housing, Nay = oppose.',
      },
      'SB 423 — Streamlined Multi-Family Housing Approval (2023)': {
        label: 'SB 423 — Streamlined Housing (2023)',
        context: 'Allows by-right approval for affordable multi-family housing near transit statewide. Yea = support, Nay = oppose.',
      },
      'AB 1033 — ADU Ownership and Separate Sale (2023)': {
        label: 'AB 1033 — ADU Sales (2023)',
        context: 'Allows homeowners to sell accessory dwelling units separately from the main residence. Yea = expand housing options, Nay = oppose.',
      },
      // Healthcare
      'SB 525 — Healthcare Worker Minimum Wage (2023)': {
        label: 'SB 525 — Healthcare Worker Min Wage (2023)',
        context: 'Sets $25/hour minimum wage for healthcare workers statewide. Yea = support higher wages, Nay = oppose.',
      },
      'AB 45 — Health Data Location Privacy (2025)': {
        label: 'AB 45 — Health Data Privacy (2025)',
        context: 'Prohibits collection and sharing of location data that could reveal visits to healthcare facilities. Yea = protect privacy, Nay = oppose.',
      },
      'SB 582 — Health Data Privacy Protections (2023)': {
        label: 'SB 582 — Health Data Privacy (2023)',
        context: 'Prohibits sharing health information with out-of-state law enforcement seeking abortion records. Yea = protect privacy, Nay = oppose.',
      },
      // Abortion
      'AB 82 — Healthcare Shield Law (2025)': {
        label: 'AB 82 — Healthcare Shield Law (2025)',
        context: 'Prohibits CA entities from cooperating with out-of-state investigations targeting legally protected healthcare including abortion and gender-affirming care. Yea = protect providers, Nay = oppose.',
      },
      'AB 352 — Abortion Provider Shield Law (2023)': {
        label: 'AB 352 — Abortion Shield Law (2023)',
        context: 'Protects CA abortion providers from out-of-state prosecution; limits cooperation with subpoenas. Yea = protect providers, Nay = oppose.',
      },
      'AB 260 — Reproductive Health Care Act (2025)': {
        label: 'AB 260 — Reproductive Health Care (2025)',
        context: 'Expands access to reproductive health services and protections. Yea = expand access, Nay = oppose.',
      },
      'SB 541 — Reproductive Health Services Access (2023)': {
        label: 'SB 541 — Reproductive Health Access (2023)',
        context: 'Expands access to reproductive health services including abortion medication at student health centers. Yea = expand access, Nay = oppose.',
      },
      // LGBTQ
      'AB 1955 — SAFETY Act: Student Gender Identity Protection (2024)': {
        label: 'AB 1955 — SAFETY Act (2024)',
        context: "Prohibits school districts from requiring staff to out a student's gender identity to parents without student consent. Yea = protect students, Nay = oppose.",
      },
      'SB 407 — LGBTQ+ Foster Care Family Protections (2023)': {
        label: 'SB 407 — LGBTQ+ Foster Care (2023)',
        context: 'Prohibits discrimination against LGBTQ+ families in foster care and adoption placements. Yea = protect families, Nay = oppose.',
      },
      // Immigration
      'SB 98 — Limit ICE Enforcement at Schools and Universities (2025)': {
        label: 'SB 98 — No ICE at Schools/Universities (2025)',
        context: 'Prohibits immigration enforcement actions at or near schools, colleges, and universities. Yea = limit enforcement, Nay = oppose.',
      },
      'AB 1306 — Limit Local Immigration Enforcement Cooperation (2023)': {
        label: 'AB 1306 — Limit ICE Cooperation (2023)',
        context: 'Restricts local law enforcement from sharing personal information with federal immigration authorities. Yea = limit cooperation, Nay = oppose.',
      },
      'SB 245/AB 311 — Food Assistance Regardless of Immigration Status (2023)': {
        label: 'SB 245/AB 311 — Food Assistance (2023)',
        context: 'Extends CalFresh food assistance eligibility to all income-eligible adults regardless of immigration status. Yea = expand access, Nay = oppose.',
      },
      // Spending
      'AB 1228 — Fast Food Minimum Wage ($20/hour) (2023)': {
        label: 'AB 1228 — Fast Food Min Wage (2023)',
        context: 'Sets $20/hour minimum wage for fast food workers; creates a Fast Food Council. Yea = support higher wages, Nay = oppose.',
      },
      'SB 140 — Early Childcare and Education Funding (2023)': {
        label: 'SB 140 — Early Childcare Funding (2023)',
        context: 'Allocates funding for early childcare and education; expands subsidized childcare slots. Yea = fund childcare, Nay = oppose.',
      },
    };

    const STATE_VOTE_CATEGORIES = ['housing', 'healthcare', 'abortion', 'lgbtq', 'immigration', 'spending'];

    function buildDonorsHtml(distNum) {
      if (!pacDonorsData || !pacDonorsData[distNum]) return '';
      const entry = pacDonorsData[distNum];
      const donors = (entry.donors || []).filter(d => !PAC_SKIP.has(d.name.toUpperCase()));
      if (!donors.length) return '';

      const fmt = n => n >= 1000 ? `$${(n / 1000).toFixed(0)}k` : `$${n}`;
      const maxTotal = donors[0].total;

      let html = `<div class="donors-section">
        <div class="donors-title">top PAC donors <span class="donors-cycle">${entry.cycle} cycle</span></div>`;
      for (const d of donors) {
        const pct = Math.round((d.total / maxTotal) * 100);
        html += `<div class="donor-row">
          <div class="donor-name">${d.name}</div>
          <div class="donor-bar-wrap">
            <div class="donor-bar" style="width:${pct}%"></div>
            <span class="donor-amt">${fmt(d.total)}</span>
          </div>
        </div>`;
      }
      html += `</div>`;
      return html;
    }

    function buildVotesHtml(distNum) {
      if (!votesData || !votesData[distNum]) return '';
      const repVotes = votesData[distNum];

      const hasAny = VOTE_CATEGORIES.some(cat =>
        (repVotes.votes[cat] || []).some(v => v.vote !== 'Not Found')
      );

      if (!hasAny) {
        return `<div class="votes-section">
          <div class="votes-title">voting record</div>
          <div class="vote-no-record">Took office in January 2025 — the bills tracked here are from the previous Congress (2023–2024).</div>
        </div>`;
      }

      let html = `<div class="votes-section"><div class="votes-title">voting record</div>`;
      for (const cat of VOTE_CATEGORIES) {
        const bills = (repVotes.votes[cat] || []).filter(v => v.vote !== 'Not Found');
        if (!bills.length) continue;
        html += `<div class="vote-category"><div class="vote-cat-label">${cat}</div>`;
        for (const bill of bills) {
          const info  = BILL_INFO[bill.label] || { label: bill.label, context: '' };
          const cls   = bill.vote === 'Yea' ? 'vote-yea' : bill.vote === 'Nay' ? 'vote-nay' : 'vote-other';
          const text  = bill.vote === 'Not Voting' ? 'Abstain' : bill.vote;
          html += `<div class="vote-row">
            <span class="vote-bill">
              ${info.label}
              ${info.context ? `<span class="vote-context">${info.context}</span>` : ''}
            </span>
            <span class="vote-cast ${cls}">${text}</span>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }

    function buildStateVotesHtml(distNum, layerKey) {
      if (!stateVotesData) return '';
      const chamber = stateVotesData[layerKey];
      if (!chamber || !chamber[distNum]) return '';
      const repVotes = chamber[distNum];

      const allBills = STATE_VOTE_CATEGORIES.flatMap(cat => repVotes.votes[cat] || []);
      const featuredBills = allBills.filter(b => b.featured);

      if (!allBills.length) {
        return `<div class="votes-section">
          <div class="votes-title">voting record</div>
          <div class="vote-no-record">No voting record found for this representative.</div>
        </div>`;
      }

      let html = `<div class="votes-section"><div class="votes-title">voting record <span style="font-weight:400;color:#444;font-size:0.65rem;letter-spacing:0">2023–25 CA sessions</span></div>`;
      for (const cat of STATE_VOTE_CATEGORIES) {
        const bills = (repVotes.votes[cat] || []).filter(b => b.featured);
        if (!bills.length) continue;
        const catLabel = cat === 'lgbtq' ? 'LGBTQ+' : cat;
        html += `<div class="vote-category"><div class="vote-cat-label">${catLabel}</div>`;
        for (const bill of bills) {
          const info = STATE_BILL_INFO[bill.label] || { label: bill.label, context: '' };
          const cls  = bill.vote === 'Yea' ? 'vote-yea' : bill.vote === 'Nay' ? 'vote-nay' : 'vote-other';
          const text = bill.vote === 'Not Voting' ? 'Abstain' : (bill.vote || 'Not Voting');
          html += `<div class="vote-row">
            <span class="vote-bill">
              ${info.label}
              ${info.context ? `<span class="vote-context">${info.context}</span>` : ''}
            </span>
            <span class="vote-cast ${cls}">${text}</span>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }

    function updatePanel(distNum, rep, layerKey) {
      if (!rep) {
        infoContent.innerHTML = `<div class="info-district">District ${distNum}</div><div class="info-vacant">No data</div>`;
        return;
      }
      const partyFull = rep.party === 'D' ? 'Democrat' : rep.party === 'R' ? 'Republican' : '';

      let sinceHtml = '';
      if (layerKey === 'house' && votesData?.[distNum]?.since) {
        sinceHtml = `<div class="info-since">In office since ${votesData[distNum].since}</div>`;
      }

      let donorsHtml = '';
      let votesHtml  = '';
      if (layerKey === 'house') {
        donorsHtml = buildDonorsHtml(distNum);
        votesHtml  = buildVotesHtml(distNum);
      } else {
        votesHtml = buildStateVotesHtml(distNum, layerKey);
      }

      infoContent.innerHTML = `
        <div class="info-district">${LAYERS[layerKey].label} · District ${distNum}</div>
        <div class="info-name">${rep.name}</div>
        ${partyFull ? `<div class="info-party ${rep.party}">${partyFull}</div>` : ''}
        ${sinceHtml}
        ${rep.website ? `<a class="info-link" href="https://${rep.website}" target="_blank" rel="noopener">website ↗</a>` : ''}
        ${rep.note   ? `<div class="info-note">${rep.note}</div>` : ''}
        ${donorsHtml}
        ${votesHtml}
      `;
    }

    function zoomToFeature(feature) {
      const [[x0, y0], [x1, y1]] = gPath.bounds(feature);
      const wrapper = document.getElementById('map-wrapper');
      const w = wrapper.offsetWidth, h = wrapper.offsetHeight;
      const scale = Math.min(20, 0.85 / Math.max((x1 - x0) / w, (y1 - y0) / h));
      svgSel.transition().duration(400).call(
        zoomBehavior.transform,
        d3.zoomIdentity.translate(w / 2 - scale * (x0 + x1) / 2, h / 2 - scale * (y0 + y1) / 2).scale(scale)
      );
    }

    function drawLayer(layerKey) {
      const cfg    = LAYERS[layerKey];
      const repMap = repsData[cfg.key];
      const geo    = geoCache[layerKey];

      highlighted = null;
      locked = null;
      infoContent.innerHTML = '<div class="info-placeholder">hover over a district</div>';
      gSel.selectAll('.district').remove();

      districts = gSel.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', d => `district ${partyClass(repMap[String(d.properties.district)])}`)
        .attr('d', gPath)
        .on('mousemove', function(event, d) {
          const num = String(d.properties.district);
          const rep = repMap[num];
          tooltip.style.display = 'block';
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 32) + 'px';
          tooltip.textContent = rep ? `District ${num} — ${rep.name}` : `District ${num}`;
          updatePanel(num, rep, layerKey);
        })
        .on('mouseleave', function() {
          tooltip.style.display = 'none';
          if (locked) {
            updatePanel(locked.num, locked.rep, locked.layerKey);
          } else {
            infoContent.innerHTML = '<div class="info-placeholder">hover over a district</div>';
          }
        })
        .on('click', function(event, d) {
          event.stopPropagation();
          svgSel.interrupt(); // cancel any in-flight zoom transition immediately
          const num = String(d.properties.district);
          const rep = repMap[num];
          districts.classed('highlighted', false);
          if (highlighted === d) {
            highlighted = null;
            locked = null;
            infoContent.innerHTML = '<div class="info-placeholder">hover over a district</div>';
            svgSel.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
          } else {
            highlighted = d;
            locked = { num, rep, layerKey };
            d3.select(this).classed('highlighted', true);
            zoomToFeature(d);
            updatePanel(num, rep, layerKey);
          }
        });
    }

    async function loadAndDraw(layerKey) {
      hideInteresting();
      if (!geoCache[layerKey]) {
        try { geoCache[layerKey] = await d3.json(LAYERS[layerKey].file); }
        catch (e) { console.error(e); return; }
      }
      drawLayer(layerKey);
    }

    async function init() {
      const wrapper = document.getElementById('map-wrapper');
      const w = wrapper.offsetWidth;
      const h = wrapper.offsetHeight;

      svgSel = d3.select('#map').attr('width', w).attr('height', h).attr('viewBox', `0 0 ${w} ${h}`);
      gSel   = svgSel.append('g');

      // Click background to reset
      svgSel.on('click', () => {
        highlighted = null;
        locked = null;
        if (districts) districts.classed('highlighted', false);
        infoContent.innerHTML = '<div class="info-placeholder">hover over a district</div>';
        svgSel.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity);
        if (window.innerWidth <= 700) infoPanel.style.height = PEEK + 'px';
      });

      zoomBehavior = d3.zoom()
        .scaleExtent([1, 20])
        .on('zoom', event => {
          gSel.attr('transform', event.transform);
          resetBtn.style.display = event.transform.k > 1.01 ? 'block' : 'none';
        });
      svgSel.call(zoomBehavior);

      resetBtn.addEventListener('click', () => {
        svgSel.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity);
      });

      let houseGeo;
      try {
        [repsData, houseGeo, votesData, stateVotesData, pacDonorsData] = await Promise.all([
          d3.json('data/ca-reps.json'),
          d3.json('data/ca-congressional.geojson'),
          d3.json('data/ca-votes.json'),
          d3.json('data/ca-state-votes.json'),
          d3.json('data/ca-pac-donors.json'),
        ]);
        geoCache['house'] = houseGeo;
      } catch (e) {
        overlay.textContent = 'error loading data';
        return;
      }

      // Senators bar
      const bar = document.getElementById('senators-bar');
      bar.innerHTML = `<span style="color:#444;font-size:.8rem;margin-right:4px">US Senators:</span>` +
        repsData.us_senators.map(s => `
          <div class="senator">
            <span class="senator-name">${s.name}</span>
            <a class="senator-link" href="https://${s.website}" target="_blank" rel="noopener">↗</a>
          </div>`).join('<span class="sep">·</span>');

      const projection = d3.geoMercator().fitExtent([[40, 40], [w - 40, h - 40]], houseGeo);
      gPath = d3.geoPath().projection(projection);

      overlay.style.display = 'none';
      drawLayer('house');

      // Layer toggle (exclude the interesting button, which has its own handler)
      document.querySelectorAll('.toggle-btn:not(#interesting-btn)').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          activeLayer = this.dataset.layer;
          loadAndDraw(activeLayer);
        });
      });

      // Search
      document.getElementById('search-form').addEventListener('submit', async e => {
        e.preventDefault();
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        statusEl.style.display = 'block';
        statusEl.textContent = 'searching…';

        let results;
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', California')}&format=json&limit=1&countrycodes=us`,
            { headers: { 'Accept-Language': 'en' } }
          );
          results = await res.json();
        } catch (e) {
          statusEl.textContent = 'search failed';
          return;
        }

        if (!results.length) { statusEl.textContent = 'location not found'; return; }

        const lon = parseFloat(results[0].lon);
        const lat = parseFloat(results[0].lat);
        const geo = geoCache[activeLayer];
        const match = geo.features.find(f => d3.geoContains(f, [lon, lat]));

        if (!match) { statusEl.textContent = 'no district found for that location'; return; }

        const num = String(match.properties.district);
        const rep = repsData[LAYERS[activeLayer].key][num];
        statusEl.textContent = rep ? `District ${num} — ${rep.name}` : `District ${num}`;

        if (districts) {
          districts.classed('highlighted', false);
          districts.filter(d => d === match).classed('highlighted', true);
        }
        highlighted = match;
        zoomToFeature(match);
        updatePanel(num, rep, activeLayer);
      });
    }

    // ── Mobile bottom sheet ───────────────────────────────────────────────────
    const mobileHandle = document.getElementById('mobile-handle');
    const PEEK = 36;
    const snapPoints = () => [PEEK, Math.round(window.innerHeight * 0.72)];

    function snapTo(h) {
      const snaps = snapPoints();
      return snaps.reduce((prev, cur) => Math.abs(cur - h) < Math.abs(prev - h) ? cur : prev);
    }

    function setSheetHeight(h) {
      const snaps = snapPoints();
      infoPanel.style.height = Math.max(PEEK, Math.min(snaps[snaps.length - 1], h)) + 'px';
    }

    function snapSheet(currentH, velocityPxPerMs) {
      const snaps = snapPoints();
      // Flick gesture: snap directionally regardless of current position
      if (Math.abs(velocityPxPerMs) > 0.3) {
        if (velocityPxPerMs > 0) return snaps.find(s => s > currentH) ?? snaps[snaps.length - 1];
        else return [...snaps].reverse().find(s => s < currentH) ?? snaps[0];
      }
      return snapTo(currentH);
    }

    let sheetStartY = 0, sheetStartH = 0, sheetStartTime = 0, sheetActive = false;

    mobileHandle.addEventListener('touchstart', e => {
      if (window.innerWidth > 700) return;
      e.stopPropagation();
      sheetActive = true;
      sheetStartY = e.touches[0].clientY;
      sheetStartH = infoPanel.offsetHeight;
      sheetStartTime = Date.now();
      infoPanel.style.transition = 'none';
    }, { passive: false });

    mobileHandle.addEventListener('touchmove', e => {
      if (!sheetActive) return;
      e.stopPropagation();
      setSheetHeight(sheetStartH + (sheetStartY - e.touches[0].clientY));
    }, { passive: false });

    mobileHandle.addEventListener('touchend', e => {
      if (!sheetActive) return;
      sheetActive = false;
      const elapsed  = Date.now() - sheetStartTime;
      const dy       = sheetStartY - e.changedTouches[0].clientY;
      const velocity = elapsed > 0 ? dy / elapsed : 0;
      infoPanel.style.transition = 'height 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
      infoPanel.style.height = snapSheet(infoPanel.offsetHeight, velocity) + 'px';
    });

    // ── Mobile tap-to-expand (iOS Safari: D3 zoom eats click events on SVG) ──
    // Detect taps on district paths via touchend at the SVG level instead.
    // Use a movement threshold so a slight finger wobble doesn't cancel a tap.
    let mapTouchStartX = 0, mapTouchStartY = 0, mapTouchMoved = false;
    document.getElementById('map').addEventListener('touchstart', e => {
      mapTouchMoved = false;
      mapTouchStartX = e.touches[0].clientX;
      mapTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('map').addEventListener('touchmove', e => {
      if (Math.abs(e.touches[0].clientX - mapTouchStartX) > 8 ||
          Math.abs(e.touches[0].clientY - mapTouchStartY) > 8) {
        mapTouchMoved = true;
      }
    }, { passive: true });
    document.getElementById('map').addEventListener('touchend', e => {
      if (mapTouchMoved || window.innerWidth > 700) return;
      const OPEN = snapPoints()[1];
      if (e.target.classList.contains('district')) {
        infoPanel.style.transition = 'height 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
        infoPanel.style.height = OPEN + 'px';
      } else {
        infoPanel.style.transition = 'height 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
        infoPanel.style.height = PEEK + 'px';
      }
    }, { passive: true });

    // ── Keyboard navigation ───────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      // Don't hijack keys while typing in the search box
      if (document.activeElement === document.getElementById('search-input')) return;

      if (e.key === 'Escape') {
        svgSel.interrupt();
        highlighted = null;
        locked = null;
        if (districts) districts.classed('highlighted', false);
        infoContent.innerHTML = '<div class="info-placeholder">hover over a district</div>';
        svgSel.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
        if (window.innerWidth <= 700) infoPanel.style.height = PEEK + 'px';
        return;
      }

      if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && districts && geoCache[activeLayer]) {
        e.preventDefault(); // prevent page scroll
        const geo    = geoCache[activeLayer];
        const repMap = repsData[LAYERS[activeLayer].key];
        const nums   = geo.features.map(f => parseInt(f.properties.district)).sort((a, b) => a - b);
        const curIdx = locked ? nums.indexOf(parseInt(locked.num)) : -1;

        let nextIdx;
        if (e.key === 'ArrowRight') {
          nextIdx = curIdx === -1 ? 0 : (curIdx + 1) % nums.length;
        } else {
          nextIdx = curIdx === -1 ? nums.length - 1 : (curIdx - 1 + nums.length) % nums.length;
        }

        const nextNum     = String(nums[nextIdx]);
        const nextFeature = geo.features.find(f => String(f.properties.district) === nextNum);
        const rep         = repMap[nextNum];

        svgSel.interrupt();
        districts.classed('highlighted', false);
        districts.filter(d => String(d.properties.district) === nextNum).classed('highlighted', true);
        highlighted = nextFeature;
        locked = { num: nextNum, rep, layerKey: activeLayer };
        zoomToFeature(nextFeature);
        updatePanel(nextNum, rep, activeLayer);
        return;
      }
    });

    // ── Interesting panel ─────────────────────────────────────────────────────
    const interestingPanel = document.getElementById('interesting-panel');
    const mainEl           = document.querySelector('.main');
    const resizeHandleEl   = document.getElementById('resize-handle');
    const interestingBtn   = document.getElementById('interesting-btn');

    function analyzeVotes(votes, party) {
      const crossParty = [];
      let partyLineCount = 0;
      let total = 0;
      for (const v of votes) {
        if (!v.progressive_vote) continue;
        if (!v.vote || v.vote === 'Not Voting' || v.vote === 'Absent' || v.vote === 'NV' || v.vote === 'Not Found') continue;
        const expected = party === 'D' ? v.progressive_vote : (v.progressive_vote === 'Yea' ? 'Nay' : 'Yea');
        total++;
        if (v.vote !== expected) {
          crossParty.push({ label: v.label, vote: v.vote, expected });
        } else {
          partyLineCount++;
        }
      }
      return { crossParty, partyLineCount, total };
    }

    function getShortLabel(label) {
      const info = BILL_INFO[label] || STATE_BILL_INFO[label];
      if (info) return info.label;
      // fallback: strip bill number prefix
      const m = label.match(/—\s*(.+)/);
      return m ? m[1].trim() : label;
    }

    function computeAnalysis() {
      const result = {
        house:        { rebels: [], strict: [] },
        state_senate: { rebels: [], strict: [] },
        assembly:     { rebels: [], strict: [] },
      };

      // US House — use all federal votes (skip null progressive_vote)
      for (const [dist, data] of Object.entries(votesData || {})) {
        const rep = repsData?.house?.[dist];
        if (!rep || rep.name === 'Vacant' || !rep.party) continue;
        const party = rep.party;
        if (party !== 'D' && party !== 'R') continue;
        const votes = Object.values(data.votes).flat();
        const { crossParty, partyLineCount, total } = analyzeVotes(votes, party);
        const entry = { dist, name: rep.name, party, crossParty, partyLineCount, total };
        if (crossParty.length > 0) result.house.rebels.push(entry);
        else if (total > 0) result.house.strict.push(entry);
      }

      // State Senate + Assembly — use all stored votes (featured and non-featured)
      for (const chkey of ['state_senate', 'assembly']) {
        const repsMap  = repsData?.[chkey] || {};
        const votesMap = stateVotesData?.[chkey] || {};
        for (const [dist, data] of Object.entries(votesMap)) {
          const rep = repsMap[dist];
          if (!rep || rep.name === 'Vacant' || !rep.party) continue;
          const party = rep.party;
          if (party !== 'D' && party !== 'R') continue;
          const votes = Object.values(data.votes).flat();
          const { crossParty, partyLineCount, total } = analyzeVotes(votes, party);
          const entry = { dist, name: rep.name, party, crossParty, partyLineCount, total };
          if (crossParty.length > 0) result[chkey].rebels.push(entry);
          else if (total > 0) result[chkey].strict.push(entry);
        }
      }

      // Sort: rebels by # crossings desc; strict by district number asc
      for (const ch of Object.values(result)) {
        ch.rebels.sort((a, b) => b.crossParty.length - a.crossParty.length || parseInt(a.dist) - parseInt(b.dist));
        ch.strict.sort((a, b) => parseInt(a.dist) - parseInt(b.dist));
      }
      return result;
    }

    function renderInteresting() {
      if (!votesData || !repsData) {
        interestingPanel.innerHTML = '<div style="color:#555;padding:40px;text-align:center">Data not loaded yet.</div>';
        return;
      }
      const analysis = computeAnalysis();

      const CHAMBER_LABELS = {
        house:        'US House',
        state_senate: 'CA State Senate',
        assembly:     'CA Assembly',
      };

      let html = '<div class="interesting-grid">';
      for (const [chkey, label] of Object.entries(CHAMBER_LABELS)) {
        const { rebels, strict } = analysis[chkey];
        html += `<div>
          <div class="interesting-col-title">${label}</div>

          <div class="interesting-sub-label rebels">crossed party line (${rebels.length})</div>`;

        if (!rebels.length) {
          html += `<div class="interesting-empty">All members voted with their party on every tracked bill.</div>`;
        } else {
          for (const r of rebels) {
            const pc = r.party === 'D' ? '#4a90d9' : '#d9504a';
            html += `<div class="rebel-card">
              <div class="rebel-header">
                <span class="rebel-name">${r.name}</span>
                <span class="rebel-meta">Dist.&nbsp;${r.dist}&thinsp;·&thinsp;<span style="color:${pc};font-weight:700">${r.party}</span></span>
              </div>`;
            for (const cross of r.crossParty) {
              const cls  = cross.vote === 'Yea' ? 'vote-yea' : 'vote-nay';
              const lbl  = getShortLabel(cross.label);
              html += `<div class="rebel-cross">
                <span class="vote-cast ${cls}">${cross.vote}</span>
                <span class="rebel-bill">${lbl}</span>
              </div>`;
            }
            html += `</div>`;
          }
        }

        html += `<div class="interesting-sub-label strict">straight party line (${strict.length})</div>`;
        if (!strict.length) {
          html += `<div class="interesting-empty">Every tracked member crossed party lines at least once.</div>`;
        } else {
          html += `<div class="strict-list">`;
          for (const s of strict) {
            const pc = s.party === 'D' ? '#4a90d9' : '#d9504a';
            html += `<div class="strict-item">
              <span class="strict-dist">${s.dist}</span>
              <span class="strict-name">${s.name}</span>
              <span class="strict-party" style="color:${pc}">${s.party}</span>
            </div>`;
          }
          html += `</div>`;
        }

        html += `</div>`;
      }
      html += `</div>`;
      interestingPanel.innerHTML = html;
    }

    function showInteresting() {
      mainEl.style.display = 'none';
      resizeHandleEl.style.display = 'none';
      interestingPanel.style.display = 'block';
      renderInteresting();
    }

    function hideInteresting() {
      interestingPanel.style.display = 'none';
      mainEl.style.display = '';
      resizeHandleEl.style.display = '';
    }

    interestingBtn.addEventListener('click', function () {
      const isActive = this.classList.contains('active');
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      if (isActive) {
        hideInteresting();
        // restore whichever layer was active
        document.querySelector(`.toggle-btn[data-layer="${activeLayer}"]`)?.classList.add('active');
      } else {
        hideInteresting(); // ensure map state is clean
        this.classList.add('active');
        showInteresting();
      }
    });

    // Resizable sidebar
    const resizeHandle = document.getElementById('resize-handle');
    resizeHandle.addEventListener('mousedown', e => {
      e.preventDefault();
      const startX     = e.clientX;
      const startWidth = infoPanel.offsetWidth;
      resizeHandle.classList.add('dragging');
      const onMove = e => {
        const w = Math.max(180, Math.min(520, startWidth + (startX - e.clientX)));
        infoPanel.style.width = w + 'px';
      };
      const onUp = () => {
        resizeHandle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    init();
  </script>
</body>
</html>

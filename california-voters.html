<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>california representatives - inky</title>
  <link rel="icon" type="image/x-icon" href="images/cat4.png">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Nav --- */
    .nav {
      background: #111;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 10;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .nav a:hover { color: #e8e8e8; }

    .nav-title {
      color: #e8e8e8;
      font-size: 1rem;
      font-weight: 600;
    }

    /* --- Senators bar --- */
    .senators-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #888;
    }

    .senators-bar .senator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .senator-name {
      color: #e8e8e8;
      font-weight: 600;
    }

    .senator-link {
      color: #666;
      text-decoration: none;
      font-size: 0.78rem;
    }

    .senator-link:hover { color: #aaa; }

    .sep { color: #333; }

    /* --- Toggle row --- */
    .controls {
      background: #1e1e1e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .toggle-btn {
      background: #2a2a2a;
      color: #888;
      border: 1px solid #333;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      transition: all 0.15s;
    }

    .toggle-btn:hover { color: #e8e8e8; border-color: #555; }

    .toggle-btn.active {
      background: #333;
      color: #e8e8e8;
      border-color: #666;
    }

    .controls-label {
      color: #555;
      font-size: 0.8rem;
      margin-right: 4px;
    }

    /* --- Main layout --- */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- Map --- */
    .map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      display: block;
    }

    /* --- Tooltip --- */
    .tooltip {
      position: fixed;
      background: #111;
      color: #e8e8e8;
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 0.82rem;
      pointer-events: none;
      display: none;
      border: 1px solid #2a2a2a;
      z-index: 100;
    }

    .district {
      cursor: pointer;
    }

    /* --- Info panel --- */
    .info-panel {
      width: 240px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid #2a2a2a;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .info-placeholder {
      color: #444;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .info-district {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .info-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e8e8e8;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .info-party {
      font-size: 0.85rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .info-party.party-D { color: #4a90d9; }
    .info-party.party-R { color: #d9504a; }

    .info-role {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 16px;
    }

    .info-link {
      display: inline-block;
      color: #aaa;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 5px 10px;
      border: 1px solid #333;
      border-radius: 3px;
      margin-top: 4px;
    }

    .info-link:hover { color: #e8e8e8; border-color: #666; }

    .info-note {
      color: #555;
      font-size: 0.75rem;
      margin-top: 12px;
      line-height: 1.5;
    }

    .info-vacant {
      color: #666;
      font-size: 0.9rem;
      font-style: italic;
    }

    .click-hint {
      color: #444;
      font-size: 0.75rem;
      margin-top: 12px;
    }

    /* --- Loading / Error --- */
    .map-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #555;
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* --- Responsive --- */
    @media (max-width: 700px) {
      .main { flex-direction: column; }
      .info-panel {
        width: 100%;
        height: 160px;
        border-left: none;
        border-top: 1px solid #2a2a2a;
        padding: 12px 16px;
      }
      .senators-bar { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-left">
      <a href="projects.html">← projects</a>
      <span class="nav-title">california representatives</span>
    </div>
    <div class="senators-bar" id="senators-bar">
      <!-- populated by JS -->
    </div>
  </nav>

  <div class="controls">
    <span class="controls-label">show:</span>
    <button class="toggle-btn active" data-layer="house">US House</button>
    <button class="toggle-btn" data-layer="state_senate">State Senate</button>
    <button class="toggle-btn" data-layer="assembly">Assembly</button>
  </div>

  <div class="main">
    <div class="map-wrapper">
      <svg id="map"></svg>
      <div class="map-overlay" id="map-overlay">loading map...</div>
    </div>

    <div class="info-panel" id="info-panel">
      <div class="info-placeholder">hover over a district</div>
    </div>
  </div>

  <script>
    const svg = d3.select('#map');
    const g = svg.append('g');
    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

    const LAYERS = {
      house:        { file: 'data/ca-congressional.geojson', key: 'house' },
      state_senate: { file: 'data/ca-state-senate.geojson',  key: 'state_senate' },
      assembly:     { file: 'data/ca-assembly.geojson',       key: 'assembly' },
    };
    const LAYER_LABEL = { house: 'US House', state_senate: 'CA State Senate', assembly: 'CA Assembly' };

    let repsData = null;
    let geoPath  = null;
    let geoCache = {};
    let activeLayer = 'house';

    async function initMap() {
      const overlay = document.getElementById('map-overlay');
      overlay.style.display = 'flex';
      overlay.textContent = 'loading...';

      let houseGeo;
      try {
        [repsData, houseGeo] = await Promise.all([
          d3.json('data/ca-reps.json'),
          d3.json('data/ca-congressional.geojson'),
        ]);
        geoCache['house'] = houseGeo;
      } catch (e) {
        overlay.textContent = 'error loading map';
        console.error(e);
        return;
      }

      // Senators bar
      const bar = document.getElementById('senators-bar');
      const parts = repsData.us_senators.map(s => `
        <div class="senator">
          <span class="senator-name">${s.name}</span>
          <a class="senator-link" href="https://${s.website}" target="_blank" rel="noopener">↗</a>
        </div>
      `).join('<span class="sep">·</span>');
      bar.innerHTML = `<span style="color:#444;font-size:.8rem;margin-right:4px">US Senators:</span>${parts}`;

      const wrapper = svg.node().parentElement;
      const w = wrapper.offsetWidth;
      const h = wrapper.offsetHeight;
      svg.attr('width', w).attr('height', h).attr('viewBox', `0 0 ${w} ${h}`);

      // Fit projection to the congressional districts (all of CA)
      const projection = d3.geoMercator().fitExtent([[20, 20], [w - 20, h - 20]], houseGeo);
      geoPath = d3.geoPath().projection(projection);

      overlay.style.display = 'none';
      drawLayer('house');
    }

    async function drawLayer(layerKey) {
      const cfg = LAYERS[layerKey];
      if (!geoCache[layerKey]) {
        try { geoCache[layerKey] = await d3.json(cfg.file); }
        catch (e) { console.error('Failed to load', cfg.file, e); return; }
      }
      const geo = geoCache[layerKey];
      const repMap = repsData[cfg.key];

      g.selectAll('.district').remove();

      g.selectAll('.district')
        .data(geo.features)
        .join('path')
        .attr('class', 'district')
        .attr('d', geoPath)
        .attr('fill', '#2a3f5a')
        .attr('stroke', 'rgba(255,255,255,0.15)')
        .attr('stroke-width', 0.5)
        .on('mouseenter', function(event, d) {
          d3.select(this).attr('fill', '#3a5f8a');
          const distNum = String(d.properties.district);
          const rep = repMap[distNum];
          tooltip.style('display', 'block')
            .text(`District ${distNum}${rep ? ' — ' + rep.name : ''}`);
          updatePanel(distNum, rep, layerKey);
        })
        .on('mousemove', function(event) {
          tooltip.style('left', (event.clientX + 14) + 'px')
                 .style('top',  (event.clientY - 32) + 'px');
        })
        .on('mouseleave', function() {
          d3.select(this).attr('fill', '#2a3f5a');
          tooltip.style('display', 'none');
        });
    }

    function updatePanel(distNum, rep, layerKey) {
      const panel = document.getElementById('info-panel');
      if (!rep) {
        panel.innerHTML = `<div class="info-district">District ${distNum}</div><div class="info-vacant">No data</div>`;
        return;
      }
      const partyFull = rep.party === 'D' ? 'Democrat' : rep.party === 'R' ? 'Republican' : '';
      panel.innerHTML = `
        <div class="info-district">${LAYER_LABEL[layerKey]} · District ${distNum}</div>
        <div class="info-name">${rep.name}</div>
        ${partyFull ? `<div class="info-party party-${rep.party}">${partyFull}</div>` : ''}
        ${rep.website ? `<a class="info-link" href="https://${rep.website}" target="_blank" rel="noopener">website ↗</a>` : ''}
        ${rep.note ? `<div class="info-note">${rep.note}</div>` : ''}
      `;
    }

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        activeLayer = this.dataset.layer;
        if (geoPath) drawLayer(activeLayer);
      });
    });

    initMap();
  </script>
</body>
</html>
